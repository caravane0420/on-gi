<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="온기(On-gi) — 친구와 함께 유튜브 영상을 실시간으로 동기화하며 시청하는 따뜻한 감성의 워치파티 서비스."
    />
    <meta name="theme-color" content="#f59e0b" />
    <title>온기 — 함께 보는 따뜻한 시간</title>

    <!-- No-flash theme init: set the .dark class before first paint -->
    <script>
      (function () {
        try {
          // Default to warm light; only dark if the user explicitly chose it
          var saved = localStorage.getItem('ongi:theme');
          var dark = saved === 'dark';
          var root = document.documentElement;
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Google AdSense (issue #10) -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8340527043375240"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
